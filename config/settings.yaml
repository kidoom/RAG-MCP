# Modular RAG MCP Server - Configuration Template
# Auto-generated by setup skill. Edit as needed.

# =============================================================================
# LLM Configuration
# =============================================================================
llm:
  provider: "deepseek"
  model: "deepseek-v4-pro"
  deployment_name: ""
  azure_endpoint: ""
  api_version: ""
  api_key: "xxxx"
  base_url: "https://api.deepseek.com/v1"
  temperature: 0.0
  max_tokens: 4096

# =============================================================================
# Embedding Configuration
# =============================================================================
embedding:
  provider: "qwen"
  model: "text-embedding-v3"
  dimensions: 1024
  azure_endpoint: ""
  deployment_name: ""
  api_version: ""
  api_key: "xxxx"
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"

# =============================================================================
# Vision LLM Configuration (for Image Captioning)
# =============================================================================
vision_llm:
  enabled: true
  provider: "qwen"
  model: "qwen-vl-max"
  azure_endpoint: ""
  deployment_name: ""
  api_version: ""
  api_key: "xxxx"
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  max_image_size: 2048

# =============================================================================
# Vector Store Configuration
# =============================================================================
vector_store:
  provider: "chroma"
  persist_directory: "./data/db/chroma"
  collection_name: "knowledge_hub"

# =============================================================================
# Retrieval Configuration
# =============================================================================
retrieval:
  dense_top_k: 20
  sparse_top_k: 20
  fusion_top_k: 10
  rrf_k: 60

# =============================================================================
# Rerank Configuration
# =============================================================================
rerank:
  enabled: true
  provider: "llm"
  model: "deepseek-v4-pro"
  top_k: 5

# =============================================================================
# Evaluation Configuration
# =============================================================================
evaluation:
  enabled: false
  provider: "custom"
  metrics:
    - "hit_rate"
    - "mrr"
    - "faithfulness"

# =============================================================================
# Observability Configuration
# =============================================================================
observability:
  log_level: "INFO"
  trace_enabled: true
  trace_file: "./logs/traces.jsonl"
  structured_logging: true

# =============================================================================
# Ingestion Configuration
# =============================================================================
ingestion:
  chunk_size: 1000
  chunk_overlap: 200
  splitter: "recursive"
  batch_size: 100
  chunk_refiner:
    use_llm: false
  metadata_enricher:
    use_llm: false
  image_captioner:
    use_vision_llm: false